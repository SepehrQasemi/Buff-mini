name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run tests
        run: |
          python -m compileall src scripts tests launch_app.py
          pytest -q

      - name: Stage28 dry-run smoke
        run: |
          python scripts/run_stage28.py --seed 42 --mode research --dry-run --budget-small --symbols BTC/USDT --timeframes 1h --windows 3m --step-months 3
